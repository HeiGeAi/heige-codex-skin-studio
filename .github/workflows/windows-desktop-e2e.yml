name: Windows ChatGPT Desktop Pet E2E

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-save sharp
      - name: Install and start ChatGPT Desktop
        shell: pwsh
        run: |
          winget install --id=9PLM9XGG6VKS --source=msstore --accept-package-agreements --accept-source-agreements --silent
          powershell -NoProfile -ExecutionPolicy Bypass -File `
            'skill\codex-skin-studio\scripts\windows\apply.ps1' `
            -ThemeDir 'skill\codex-skin-studio\examples\slayers-xellos-night' -Force
      - name: Verify the official Windows hatch-pet contract
        shell: pwsh
        run: |
          $package = Get-AppxPackage -Name OpenAI.Codex -ErrorAction Stop
          $source = Get-ChildItem -LiteralPath $package.InstallLocation -Filter 'codex-pet-contract.md' -File -Recurse -ErrorAction Stop | Select-Object -First 1
          if (-not $source) { throw "The installed ChatGPT Desktop package does not contain codex-pet-contract.md" }
          node skill\codex-skin-studio\scripts\verify-pet-contract.mjs `
            --source $source.FullName `
            --contract skill\codex-skin-studio\templates\pet-contract.json `
            --platform win32 --json
      - name: Install the example Pet
        shell: pwsh
        run: |
          $pets = Join-Path $env:USERPROFILE '.codex\pets\mascot'
          New-Item -ItemType Directory -Force -Path $pets | Out-Null
          Copy-Item 'skill\codex-skin-studio\examples\pets\mascot\pet.json' (Join-Path $pets 'pet.json') -Force
          Copy-Item 'skill\codex-skin-studio\examples\pets\mascot\spritesheet.webp' (Join-Path $pets 'spritesheet.webp') -Force
      - name: Refresh and select the custom Pet through visible UI
        shell: pwsh
        run: |
          node skill\codex-skin-studio\scripts\verify-pet-desktop.mjs --pet-id mascot --port 9341 --json
